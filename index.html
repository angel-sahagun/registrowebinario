<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Angel Sahagun Registro </title>
  <!-- EmailJS -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <!-- Google Fonts + Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0A0C12;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }

    /* Fondo con textura sutil y glow premium */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(30, 40, 55, 0.6), rgba(5, 8, 14, 0.95));
      z-index: -2;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cGF0aCBmaWxsPSIjMjYyZjNiIiBmaWxsLW9wYWNpdHk9IjAuMTUiIGQ9Ik0wIDBoNDB2NDBIMHoiLz48cGF0aCBkPSJNMzAgMTBhMTAgMTAgMCAwIDEgMCAyMCAxMCAxMCAwIDAgMSAwLTIweiIgc3Ryb2tlPSIjM2E0NjU0IiBmaWxsPSJub25lIiBzdHJva2Utd2lkdGg9IjAuNSIvPjwvc3ZnPg==');
      background-repeat: repeat;
      opacity: 0.2;
      pointer-events: none;
      z-index: -1;
    }

    /* Contenedor principal cristal */
    .register-container {
      max-width: 680px;
      width: 100%;
      background: rgba(18, 22, 30, 0.85);
      backdrop-filter: blur(16px);
      border-radius: 2.5rem;
      box-shadow: 0 35px 70px -20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    /* Hero con degradado dorado/azul profundo */
    .hero-section {
      background: linear-gradient(125deg, #0B121C 0%, #121C2A 100%);
      padding: 2.5rem 2rem;
      text-align: center;
      position: relative;
      border-bottom: 1px solid rgba(212, 175, 55, 0.25);
    }
    .hero-section::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -10%;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.12), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .hero-section::after {
      content: '';
      position: absolute;
      bottom: -20px;
      right: -20px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(70, 130, 200, 0.1), transparent);
      border-radius: 50%;
      pointer-events: none;
    }

    .badge-premium {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(212, 175, 55, 0.12);
      backdrop-filter: blur(4px);
      padding: 0.45rem 1.4rem;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #D4AF37;
      margin-bottom: 1.3rem;
      border: 1px solid rgba(212, 175, 55, 0.3);
      text-transform: uppercase;
    }

    .hero-section h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.1rem;
      font-weight: 600;
      background: linear-gradient(135deg, #FFFFFF, #E0D6B0, #C5A028);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.75rem;
      letter-spacing: -0.3px;
    }

    .hero-section .sub {
      font-size: 0.9rem;
      font-weight: 400;
      color: #A6B3C9;
      letter-spacing: 0.2px;
    }

    .form-wrapper {
      padding: 2rem 2rem 1.8rem;
    }

    /* grid elegante */
    .grid-2cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .input-group {
      margin-bottom: 1.25rem;
      display: flex;
      flex-direction: column;
    }

    .input-group label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #C9D4E6;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-group label i {
      color: #D4AF37;
      font-size: 0.75rem;
      width: 20px;
    }

    .required-star {
      color: #E0A23B;
      font-size: 0.85rem;
      margin-left: 3px;
    }

    .optional-badge {
      background: rgba(212, 175, 55, 0.15);
      color: #D4AF37;
      font-size: 0.55rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 40px;
      text-transform: none;
      letter-spacing: normal;
    }

    .input-group input, 
    .input-group select, 
    .input-group textarea {
      background: rgba(12, 16, 24, 0.9);
      border: 1px solid rgba(70, 85, 105, 0.6);
      border-radius: 1.25rem;
      padding: 0.85rem 1rem;
      font-size: 0.9rem;
      font-family: 'Inter', monospace;
      transition: all 0.25s;
      color: #F0F3FA;
      font-weight: 500;
      outline: none;
      backdrop-filter: blur(4px);
    }

    .input-group textarea {
      resize: vertical;
      min-height: 85px;
    }

    .input-group input:focus, 
    .input-group select:focus, 
    .input-group textarea:focus {
      border-color: #D4AF37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
      background: #0B111A;
    }

    .input-group input.error-input, 
    .input-group select.error-input, 
    .input-group textarea.error-input {
      border-color: #E64A4A;
      background-color: rgba(230, 74, 74, 0.08);
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%,100%{ transform: translateX(0);}
      25%{ transform: translateX(-5px);}
      75%{ transform: translateX(5px);}
    }

    .hint-text {
      font-size: 0.6rem;
      color: #8F9BB2;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-note {
      background: rgba(212, 175, 55, 0.08);
      border-radius: 1rem;
      padding: 0.8rem 1rem;
      margin-bottom: 1.6rem;
      font-size: 0.7rem;
      color: #E9D49C;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 3px solid #D4AF37;
      font-weight: 500;
      backdrop-filter: blur(5px);
    }

    /* Botón primario dorado */
    .submit-btn {
      width: 100%;
      background: linear-gradient(98deg, #B8860B, #D4AF37, #E4C468);
      border: none;
      padding: 1rem 1.2rem;
      font-size: 1rem;
      font-weight: 800;
      font-family: 'Inter', sans-serif;
      color: #0B0E14;
      border-radius: 2rem;
      cursor: pointer;
      margin-top: 0.8rem;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 10px 20px -6px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 215, 0, 0.3);
      letter-spacing: 0.5px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(98deg, #C9A03D, #E9C468, #F5D97A);
      box-shadow: 0 18px 28px -10px rgba(212, 175, 55, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      transform: none;
      cursor: not-allowed;
    }

    /* Toast con estilo dorado */
    .notification-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(10, 14, 22, 0.96);
      backdrop-filter: blur(16px);
      color: #F8F3E2;
      padding: 1rem 2rem;
      border-radius: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 0.85rem;
      box-shadow: 0 20px 35px -5px black;
      z-index: 2000;
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      opacity: 0;
      visibility: hidden;
      border: 1px solid rgba(212, 175, 55, 0.5);
      letter-spacing: 0.2px;
    }
    .notification-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      visibility: visible;
    }
    .notification-toast.success-toast {
      background: linear-gradient(115deg, #1D5B3E, #0E3824);
      border-color: #D4AF37;
    }
    .notification-toast.error-toast {
      background: linear-gradient(115deg, #881a1f, #5c1014);
      border-color: #E68A2E;
    }

    /* Footer completamente eliminado - sin badges de acceso garantizado, etc */
    .footer-note {
      display: none;
    }

    @media (max-width: 580px) {
      .grid-2cols {
        grid-template-columns: 1fr;
        gap: 0;
      }
      .form-wrapper {
        padding: 1.5rem;
      }
      .hero-section h1 {
        font-size: 1.6rem;
      }
      .hero-section {
        padding: 1.8rem;
      }
    }
  </style>
</head>
<body>
<div class="register-container">
  <div class="hero-section">
    <div class="badge-premium">
      <i class="fas fa-crown"></i> <span>Webinar ANGEL SAHAGUN</span>
    </div>

    <div class="sub">Acceso directo por Microsoft Teams · Cupos limitados</div>
  </div>

  <div class="form-wrapper">
    <form id="premiumWebinarForm">
      <div class="grid-2cols">
        <div class="input-group">
          <label><i class="fas fa-user-astronaut"></i> Nombre(s) <span class="required-star">*</span></label>
          <input type="text" id="nombre" placeholder="Campo obligatorio" required autocomplete="given-name">
        </div>
        <div class="input-group">
          <label><i class="fas fa-user-tie"></i> Apellido(s) <span class="required-star">*</span></label>
          <input type="text" id="apellidos" placeholder="Campo obligatorio" required autocomplete="family-name">
        </div>
      </div>

      <div class="input-group">
        <label><i class="fas fa-envelope-gold"></i> Correo electrónico <span class="required-star">*</span></label>
        <input type="email" id="email" placeholder="Campo obligatorio" required autocomplete="email">
        <div class="hint-text"><i class="fas fa-key"></i> Te enviaremos el acceso VIP y materiales</div>
      </div>

      <div class="input-group">
        <label><i class="fas fa-phone-ring"></i> Teléfono directo <span class="optional-badge">Opcional</span></label>
        <input type="tel" id="telefono" placeholder="Campo opcional" inputmode="numeric">
        <div class="hint-text"><i class="fas fa-shield-alt"></i> Solo dígitos, 10 caracteres</div>
      </div>

      <div class="info-note">
        <i class="fas fa-chart-net"></i>
        <span>Información estratégica para garantizar una experiencia a tu medida</span>
      </div>

      <div class="grid-2cols">
        <div class="input-group">
          <label><i class="fas fa-briefcase-clock"></i> Puesto actual <span class="required-star">*</span></label>
          <input type="text" id="puesto" placeholder="Campo obligatorio" required>
        </div>
        <div class="input-group">
          <label><i class="fas fa-diagram-project"></i> Área <span class="required-star">*</span></label>
          <input type="text" id="area" placeholder="Campo obligatorio" required>
        </div>
      </div>

      <div class="grid-2cols">
        <div class="input-group">
          <label><i class="fas fa-chart-line"></i> Años en industria <span class="required-star">*</span></label>
          <input type="number" id="aniosIndustria" min="1" max="60" placeholder="Campo obligatorio solo Numeros" required>
        </div>
        <div class="input-group">
          <label><i class="fas fa-building"></i> Ramo empresarial <span class="required-star">*</span></label>
          <input type="text" id="ramo" placeholder="Campo obligatorio" required>
        </div>
      </div>

      <div class="input-group">
        <label><i class="fas fa-brain"></i> Nivel de expertise <span class="required-star">*</span></label>
        <select id="conocimiento" required>
          <option value="" disabled selected>Selecciona tu nivel</option>
          <option value="Alto">Alto </option>
          <option value="Medio">Medio </option>
          <option value="Bajo">Bajo </option>
        </select>
      </div>

      <div class="input-group">
        <label><i class="fas fa-message-quote"></i> ¿Qué esperas del webinar?</label>
        <textarea id="puntosEspeciales" placeholder="Campo obligatorio"></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <i class="fas fa-gem"></i> Reservar mi Lugar
      </button>
    </form>
  </div>
  <!-- Footer eliminado: sin textos "Acceso garantizado", "Certificado digital", "Soporte premium" -->
</div>

<script>
  // ========= CONFIGURACIÓN EMAILJS =========
  const EMAILJS_PUBLIC_KEY = "hK114gVXTRlfJdVI4";
  const EMAILJS_SERVICE_ID = "service_6cke3k3";
  const EMAILJS_TEMPLATE_ADMIN = "template_ovhtio9";     // Notificación para el organizador
  const EMAILJS_TEMPLATE_CLIENTE = "template_a9h9xe3";   // Envío de accesos al alumno
  
  emailjs.init(EMAILJS_PUBLIC_KEY);
  
  // Elementos DOM
  const form = document.getElementById('premiumWebinarForm');
  const nombreInput = document.getElementById('nombre');
  const apellidosInput = document.getElementById('apellidos');
  const emailInput = document.getElementById('email');
  const telefonoInput = document.getElementById('telefono');
  const puestoInput = document.getElementById('puesto');
  const areaInput = document.getElementById('area');
  const aniosIndustriaInput = document.getElementById('aniosIndustria');
  const ramoInput = document.getElementById('ramo');
  const conocimientoSelect = document.getElementById('conocimiento');
  const puntosEspecialesTextarea = document.getElementById('puntosEspeciales');
  const submitBtn = document.getElementById('submitBtn');
  
  // Toast component
  let toastDiv = document.querySelector('.notification-toast');
  if (!toastDiv) {
    toastDiv = document.createElement('div');
    toastDiv.className = 'notification-toast';
    document.body.appendChild(toastDiv);
  }
  let toastTimeout = null;
  function showToast(message, type) {
    if (toastTimeout) clearTimeout(toastTimeout);
    toastDiv.classList.remove('show', 'success-toast', 'error-toast');
    void toastDiv.offsetWidth;
    let iconHtml = type === 'success' ? '<i class="fas fa-check-double"></i>' : '<i class="fas fa-skull-crosswalk"></i>';
    toastDiv.innerHTML = `${iconHtml} <span>${message}</span>`;
    if (type === 'success') toastDiv.classList.add('success-toast');
    else if (type === 'error') toastDiv.classList.add('error-toast');
    toastDiv.classList.add('show');
    toastTimeout = setTimeout(() => toastDiv.classList.remove('show'), 5500);
  }
  
  function addErrorAnimation(el) {
    if (!el) return;
    el.classList.add('error-input');
    el.focus({ preventScroll: true });
    setTimeout(() => el.classList.remove('error-input'), 500);
  }
  
  function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }
  function validatePhone(phone) {
    if (!phone) return true;
    return /^\d{10}$/.test(phone);
  }
  
  // Envío al ADMIN (notificación de nuevo registro)
  async function sendAdminNotification(formData) {
    const adminParams = {
      to_email: "tucorreo@tudominio.com",    // ¡IMPORTANTE! CAMBIAR POR CORREO REAL DEL ADMIN
      nombre: formData.nombre,
      apellidos: formData.apellidos,
      email: formData.email,
      telefono: formData.telefono || 'No indicado',
      puesto: formData.puesto,
      area: formData.area,
      anios_industria: formData.aniosIndustria,
      ramo: formData.ramo,
      conocimiento: formData.conocimiento,
      puntos_especiales: formData.puntosEspeciales || 'Sin especificar',
      fecha_registro: new Date().toLocaleString('es-ES', { timeZone: 'America/Mexico_City' })
    };
    return await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ADMIN, adminParams);
  }
  
  // Envío al CLIENTE: ACCESO AL CURSO / WEBINAR (datos dinámicos + link)
  async function sendClientAccessEmail(formData) {
    const clientParams = {
      email: formData.email,
      nombre_alumno: formData.nombre,
      apellidos_alumno: formData.apellidos,
      email_alumno: formData.email,
      telefono_alumno: formData.telefono || 'No proporcionado',
      // Personaliza los datos del curso aquí (branding premium)
      nombre_curso: "Webinar Elite: Liderazgo y Estrategia 2026",
      link_acceso: "https://vip.angelsahagun.com/acceso-webinar",
      usuario_acceso: formData.email,
      contrasena_acceso: "ELITE2026",
      fecha_inicio: "22 de Junio de 2026 - 7:00 PM (CDMX)",
      duracion: "2 horas de contenido + Q&A",
      mensaje_bienvenida: `${formData.nombre}, te damos la bienvenida a esta experiencia exclusiva. Adjuntamos tus credenciales para acceder a la sala privada de Microsoft Teams. ¡Prepárate para transformar tu visión!`
    };
    return await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_CLIENTE, clientParams);
  }
  
  // Evento principal
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const nombre = nombreInput.value.trim();
    const apellidos = apellidosInput.value.trim();
    const email = emailInput.value.trim();
    let telefono = telefonoInput.value.trim();
    const puesto = puestoInput.value.trim();
    const area = areaInput.value.trim();
    const aniosIndustria = aniosIndustriaInput.value.trim();
    const ramo = ramoInput.value.trim();
    const conocimiento = conocimientoSelect.value;
    const puntosEspeciales = puntosEspecialesTextarea.value.trim();
    
    let hasError = false;
    if (nombre.length < 2) { addErrorAnimation(nombreInput); showToast("❌ Nombre válido requerido", "error"); hasError = true; }
    else if (apellidos.length < 2) { addErrorAnimation(apellidosInput); showToast("❌ Apellidos requeridos", "error"); hasError = true; }
    else if (!email || !validateEmail(email)) { addErrorAnimation(emailInput); showToast("❌ Correo electrónico inválido", "error"); hasError = true; }
    else if (telefono && !validatePhone(telefono)) { addErrorAnimation(telefonoInput); showToast("❌ Teléfono: 10 dígitos numéricos", "error"); hasError = true; }
    else if (!puesto) { addErrorAnimation(puestoInput); showToast("❌ Indica tu puesto actual", "error"); hasError = true; }
    else if (!area) { addErrorAnimation(areaInput); showToast("❌ Área profesional requerida", "error"); hasError = true; }
    else if (!aniosIndustria || isNaN(aniosIndustria) || Number(aniosIndustria) < 0 || Number(aniosIndustria) > 60) { addErrorAnimation(aniosIndustriaInput); showToast("❌ Años en industria (0-60)", "error"); hasError = true; }
    else if (!ramo) { addErrorAnimation(ramoInput); showToast("❌ Ramo de empresa obligatorio", "error"); hasError = true; }
    else if (!conocimiento) { addErrorAnimation(conocimientoSelect); showToast("❌ Selecciona tu nivel de conocimiento", "error"); hasError = true; }
    
    if (hasError) return;
    
    if (telefono) {
      telefono = telefono.replace(/\D/g, '').slice(0,10);
      telefonoInput.value = telefono;
    }
    
    const formData = { nombre, apellidos, email, telefono: telefono || '', puesto, area, aniosIndustria, ramo, conocimiento, puntosEspeciales };
    
    submitBtn.disabled = true;
    const originalHtml = submitBtn.innerHTML;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Procesando reserva...';
    
    try {
      // 1. Enviar el correo de ACCESOS al cliente (prioridad)
      await sendClientAccessEmail(formData);
      // 2. Notificación al administrador
      await sendAdminNotification(formData);
      showToast("✅ ¡Registro confirmado! Revisa tu bandeja de entrada (y spam) con los accesos al webinar.", "success");
      form.reset();
      nombreInput.focus();
    } catch (error) {
      console.error("EmailJS error:", error);
      let friendlyMsg = "⚠️ No pudimos completar el registro. Contacta a soporte.";
      if (error.text) {
        if (error.text.includes("template")) friendlyMsg = "Error de configuración de plantilla. Contacta al administrador.";
        else friendlyMsg = `Error: ${error.text.substring(0, 100)}`;
      } else if (error.message) friendlyMsg = `Error: ${error.message}`;
      showToast(friendlyMsg, "error");
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = originalHtml;
    }
  });
  
  // Validaciones en tiempo real + UX
  telefonoInput.addEventListener('input', (e) => {
    let v = e.target.value.replace(/\D/g, '');
    if (v.length > 10) v = v.slice(0,10);
    e.target.value = v;
    if (v.length === 10 || v === '') telefonoInput.classList.remove('error-input');
  });
  emailInput.addEventListener('input', () => { if (validateEmail(emailInput.value.trim())) emailInput.classList.remove('error-input'); });
  const clearErrors = (el, validator) => {
    el.addEventListener('focus', () => el.classList.remove('error-input'));
    if (validator) el.addEventListener('input', () => { if (validator(el.value.trim())) el.classList.remove('error-input'); });
  };
  clearErrors(nombreInput, v => v.length>=2);
  clearErrors(apellidosInput, v => v.length>=2);
  clearErrors(puestoInput, v => v.length>0);
  clearErrors(areaInput, v => v.length>0);
  clearErrors(aniosIndustriaInput, v => !isNaN(v) && v>=0 && v<=60);
  clearErrors(ramoInput, v => v.length>0);
  conocimientoSelect.addEventListener('change', () => { if (conocimientoSelect.value) conocimientoSelect.classList.remove('error-input'); });
  
  aniosIndustriaInput.addEventListener('blur', () => {
    let val = parseInt(aniosIndustriaInput.value);
